name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :fabric:build :neoforge:build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Beacon Obscura ${{ github.ref_name }}
          body: |
            **Minecraft 26.1.2 – 26.2 | Fabric and NeoForge**

            Place tinted glass above a beacon to hide the beam while keeping all effects active. Server-side only — no client mod required.

            - `beacon-obscura-fabric-${{ github.ref_name }}.jar` — Fabric (requires Fabric API)
            - `beacon-obscura-neoforge-${{ github.ref_name }}.jar` — NeoForge
          files: |
            fabric/build/libs/beacon-obscura-fabric-${{ github.ref_name }}.jar
            neoforge/build/libs/beacon-obscura-neoforge-${{ github.ref_name }}.jar
          fail_on_unmatched_files: true
